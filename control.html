<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<title>Control</title>
<style>
body{font-family:sans-serif;background:#111;color:#fff;padding:20px}
.card{background:#222;padding:15px;border-radius:10px;margin-bottom:15px}
button,input{padding:8px;margin:4px}
.quest-table{width:100%;border-collapse:collapse}
.quest-table th,.quest-table td{padding:8px 10px;text-align:left;border-bottom:1px solid #444;vertical-align:middle}
.quest-table th{color:#aaa;font-size:14px;font-weight:normal}
.quest-table th.col-goal,.quest-table td.col-goal{width:90px;text-align:center}
.quest-table th.col-done,.quest-table td.col-done{width:60px;text-align:center}
.quest-table th.col-action,.quest-table td.col-action{width:80px;text-align:center}
.quest-table td.col-name{font-weight:bold}
.quest-table label.goal-select{cursor:pointer}
.quest-form{display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px 16px}
.quest-form .field{display:flex;flex-direction:column;gap:4px}
.quest-form label{font-size:14px;color:#aaa}
.quest-form input[type="number"]{width:100px}
</style></head><body>
<h1>配信RPG 管理画面</h1>
<div class="card">
<div id="stats"></div>
<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px">
<button id="slotBtn1" onclick="switchSlot(1)">セーブデータ1</button>
<button id="slotBtn2" onclick="switchSlot(2)">セーブデータ2</button>
<button id="slotBtn3" onclick="switchSlot(3)">セーブデータ3</button>
</div>
<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px">
<button onclick="resetStats()">レベル/経験値をリセット</button>
<button onclick="clearQuests()">クエスト一覧を全削除</button>
</div>
</div>
<div class="card">
<button onclick="addExp(10)">+10EXP</button>
<button onclick="addExp(50)">+50EXP</button>
<button onclick="addExp(100)">+100EXP</button>
<button onclick="addExp(-10)" style="margin-left:200px">-10EXP</button>
<button onclick="addExp(-50)">-50EXP</button>
<button onclick="addExp(-100)">-100EXP</button>
<button onclick="dismissOverlayPopup()" style="margin-left:20px">演出を閉じる</button>
</div>
<div class="card quest-form">
<div class="field">
<label for="qname">クエスト名</label>
<input id="qname" placeholder="例: 雑談30分">
</div>
<div class="field">
<label for="qexp">達成時の経験値</label>
<input id="qexp" type="number" value="20" min="1">
</div>
<button onclick="addQuest()">追加</button>
</div>
<div class="card">
<table class="quest-table">
<thead>
<tr>
<th class="col-goal">今日の目標</th>
<th class="col-done">達成</th>
<th class="col-name">クエスト</th>
<th class="col-action"></th>
</tr>
</thead>
<tbody id="quests"></tbody>
</table>
</div>

<script>
const bc=new BroadcastChannel("rpg");
const CURRENT_SLOT_KEY="rpg_currentSlot";
const LEGACY_KEY="rpg_state";
const SLOT_KEY=(i)=>`rpg_slot_${i}`;
const RARE_WIN_RATE=0.04;   // 4%
const RARE_LOSE_RATE=0.08;  // 8%

function defaultState(){
  return {
    level:1,
    exp:0,
    nextExp:100,
    quests:[],
    goalIndex:-1,
    nextQuestMultiplier:1,
    nextQuestBonus:0
  };
}

let currentSlot=parseInt(localStorage.getItem(CURRENT_SLOT_KEY)||"1",10);
if(![1,2,3].includes(currentSlot)) currentSlot=1;

function loadSlot(i){
  return JSON.parse(localStorage.getItem(SLOT_KEY(i))||"null");
}

function persist(){
  localStorage.setItem(SLOT_KEY(currentSlot),JSON.stringify(state));
  // overlay.htmlとの互換のため、従来キーも常に同期しておく
  localStorage.setItem(LEGACY_KEY,JSON.stringify(state));
}

let state=loadSlot(currentSlot);
if(!state){
  // 既存ユーザーの legacy データを slot1 に取り込む
  const legacy=JSON.parse(localStorage.getItem(LEGACY_KEY)||"null");
  state=legacy||defaultState();
}

if(state.goalIndex==null || typeof state.goalIndex!=="number"){
  state.goalIndex=-1;
}
if(typeof state.nextQuestMultiplier!=="number") state.nextQuestMultiplier=1;
if(typeof state.nextQuestBonus!=="number") state.nextQuestBonus=0;

function normalizeGoalIndex(){
// 「なし」を選択している場合は上書きしない
if(state.goalIndex===-1) return;
if(!state.quests.length){state.goalIndex=-1;return;}
if(state.goalIndex<0||state.goalIndex>=state.quests.length){
const fi=state.quests.findIndex(q=>!q.done);
state.goalIndex=fi>=0?fi:0;
}
}

function save(event=null){
persist();
bc.postMessage({state,event});
render();
}

function pickRareEvent(){
const roll=Math.random();
if(roll<RARE_WIN_RATE){
const rewards=[
  {title:"✨ LUCKY BONUS!",message:"🚀 クエスト一つを達成済みにできる",effect:"none"},
  {title:"✨ LUCKY BONUS!",message:"⭐ 次のクエストEXP2倍",effect:"double"},
  {title:"✨ LUCKY BONUS!",message:"次のクエスト達成時、追加で +20 EXP！",effect:"plus20"}
];
const r=rewards[Math.floor(Math.random()*rewards.length)];
// 経験値系の効果を state にセット
if(r.effect==="double"){
  state.nextQuestMultiplier=2;
}else if(r.effect==="plus20"){
  state.nextQuestBonus+=20;
}
return {type:"rare",outcome:"win",title:r.title,message:r.message};
}
if(roll<RARE_WIN_RATE+RARE_LOSE_RATE){
const penalties=[
  "🐱 次の一言だけ語尾にゃ",
  "🎭 次のコメントに全力リアクション",
  "🎤 今すぐ拍手する"
];
const msg=penalties[Math.floor(Math.random()*penalties.length)];
return {type:"rare",outcome:"lose",title:"💀 TRAP EVENT!",message:msg};
}
return null;
}

function render(){
const done=state.quests.filter(q=>q.done).length;
document.getElementById("stats").innerHTML=
`Lv.${state.level}<br>EXP ${state.exp}/${state.nextExp}<br>${done}/${state.quests.length}`;

// 現在のスロットを見た目で分かるようにする
const sb=(n)=>document.getElementById(`slotBtn${n}`);
if(sb(1)){
  sb(1).style.opacity=(currentSlot===1)?1:0.55;
  sb(2).style.opacity=(currentSlot===2)?1:0.55;
  sb(3).style.opacity=(currentSlot===3)?1:0.55;
}

const noneRow=`
<tr>
<td class="col-goal">
<label class="goal-select" title="オーバーレイに表示しない（なし）">
<input type="radio" name="goal" ${state.goalIndex===-1?'checked':''} onchange="setGoal(-1)">
</label>
</td>
<td class="col-done"></td>
<td class="col-name" style="color:#888;font-weight:normal">なし</td>
<td class="col-action"></td>
</tr>`;

const questRows=state.quests.map((q,i)=>`
<tr>
<td class="col-goal">
<label class="goal-select" title="オーバーレイに表示するクエスト">
<input type="radio" name="goal" ${i===state.goalIndex?'checked':''} onchange="setGoal(${i})">
</label>
</td>
<td class="col-done">
<input type="checkbox" title="クエスト達成" ${q.done?'checked':''} onchange="toggleQuest(${i}, this.checked)">
</td>
<td class="col-name">${q.name} <span style="font-weight:normal;color:#aaa">(+${q.exp} EXP)</span></td>
<td class="col-action"><button onclick="removeQuest(${i})">削除</button></td>
</tr>`).join("");

document.getElementById("quests").innerHTML=
state.quests.length ? (noneRow + questRows) :
(noneRow +
`<tr><td colspan="4" style="color:#888;text-align:center">クエストがありません</td></tr>`);
}

function addQuest(){
const n=qname.value.trim();
const e=parseInt(qexp.value)||20;
if(!n)return;
state.quests.push({name:n,exp:e,done:false});
// 「なし」を選んでいる場合は自動で選び直さない
if(state.quests.length===1 && state.goalIndex!==-1) state.goalIndex=0;
qname.value="";
save();
}

function setGoal(i){state.goalIndex=i;save();}

function addExp(v){
let before=state.level;
state.exp+=v;
while(state.exp>=state.nextExp){state.exp-=state.nextExp;state.level++;}
while(state.exp<0 && state.level>1){
state.level--;
state.exp+=state.nextExp;
}
if(state.level===1 && state.exp<0) state.exp=0;

if(state.level>before){
save({type:"levelup",from:before,to:state.level});
return;
}
save();
}

function toggleQuest(i, checked){
const q=state.quests[i];
if(!q) return;

// チェックON: クエスト達成として加算
if(checked){
if(q.done) return;
q.done=true;
const before=state.level;
let gain=q.exp;
// レアイベントのバフを適用
if(state.nextQuestMultiplier && state.nextQuestMultiplier>1){
  gain*=state.nextQuestMultiplier;
}
if(state.nextQuestBonus){
  gain+=state.nextQuestBonus;
}
state.exp+=gain;
// 一度使ったらリセット
state.nextQuestMultiplier=1;
state.nextQuestBonus=0;
while(state.exp>=state.nextExp){state.exp-=state.nextExp;state.level++;}
save({type:"quest",name:q.name,exp:gain});
if(before!=state.level){
bc.postMessage({state,event:{type:"levelup",from:before,to:state.level}});
}
const rareEvent=pickRareEvent();
if(rareEvent){
setTimeout(()=>bc.postMessage({state,event:rareEvent}),400);
}
return;
}

// チェックOFF: 誤操作取り消しとして減算（レベルダウンも考慮）
if(!q.done) return;
q.done=false;
state.exp-=q.exp;
while(state.exp<0 && state.level>1){
state.level--;
state.exp+=state.nextExp;
}
if(state.level===1 && state.exp<0) state.exp=0;
save();
}

function resetStats(){
state.level=1;
state.exp=0;
state.nextExp=100;
state.quests.forEach(q=>q.done=false);
save();
}

function clearQuests(){
state.quests=[];
normalizeGoalIndex();
save();
}

function dismissOverlayPopup(){
bc.postMessage({state,event:{type:"dismiss"}});
}

function removeQuest(i){
state.quests.splice(i,1);
if(i<state.goalIndex) state.goalIndex--;
else if(i===state.goalIndex) normalizeGoalIndex();
save();
}

normalizeGoalIndex();
persist();
render();
bc.postMessage({state});

function switchSlot(i){
currentSlot=i;
localStorage.setItem(CURRENT_SLOT_KEY,String(currentSlot));

const loaded=loadSlot(currentSlot);
state=loaded||defaultState();
if(state.goalIndex==null) state.goalIndex=-1;
normalizeGoalIndex();
persist();
render();
bc.postMessage({state});
}
</script></body></html>
